  <title>叮当快乐盲盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D8EA 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      padding: 20px;
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: cloudFloat 25s linear infinite;
    }

    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud-1 { width: 100px; height: 40px; top: 10%; left: -100px; }
    .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
    .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 45px; }

    .cloud-2 { width: 80px; height: 35px; top: 20%; left: -80px; animation-delay: 8s; }
    .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 10px; }
    .cloud-2::after { width: 35px; height: 35px; top: -12px; left: 35px; }

    .cloud-3 { width: 120px; height: 50px; top: 5%; left: -120px; animation-delay: 16s; }
    .cloud-3::before { width: 60px; height: 60px; top: -30px; left: 20px; }
    .cloud-3::after { width: 50px; height: 50px; top: -20px; left: 55px; }

    @keyframes cloudFloat {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(100vw + 200px)); }
    }

    /* 艺术字标题 */
    .title {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 20px;
      text-align: center;
      z-index: 10;
      /* 蓝白渐变 */
      background: linear-gradient(180deg, #FFFFFF 0%, #87CEEB 50%, #1E90FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      /* 立体阴影 */
      filter: drop-shadow(3px 3px 0px rgba(0,100,200,0.3))
              drop-shadow(6px 6px 0px rgba(0,80,180,0.2));
      animation: titlePulse 2s ease-in-out infinite;
      position: relative;
    }

    .title::after {
      content: '叮当快乐盲盒';
      position: absolute;
      left: 0;
      top: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(135,206,235,0.3) 50%, rgba(30,144,255,0.3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(8px);
      z-index: -1;
    }

    @keyframes titlePulse {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50% { transform: scale(1.05) rotate(2deg); }
    }

    /* 哆啦 A 梦容器 */
    .doraemon-wrapper {
      position: relative;
      width: 300px;
      height: 360px;
      cursor: pointer;
      z-index: 10;
      animation: doraemonFloat 3s ease-in-out infinite;
    }

    @keyframes doraemonFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }

    .doraemon-wrapper:hover {
      animation-play-state: paused;
      transform: scale(1.05);
    }

    .doraemon-wrapper:active {
      transform: scale(0.95);
    }

    .doraemon-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      mix-blend-mode: screen;
      filter: drop-shadow(0 15px 30px rgba(0,100,200,0.3));
    }

    /* 肚子点击区域 */
    .belly-area {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 60px;
      cursor: pointer;
      animation: bellyGlow 1.5s ease-in-out infinite;
      border-radius: 50%;
      z-index: 20;
      background: rgba(255, 215, 0, 0.01);
    }

    @keyframes bellyGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
      50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.7), 0 0 50px rgba(255, 215, 0, 0.3); }
    }

    /* 道具掉落动画 */
    @keyframes itemDrop {
      0% {
        opacity: 0;
        transform: translateY(-50px) scale(0.3) rotate(-30deg);
      }
      50% {
        transform: translateY(20px) scale(1.1) rotate(10deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    /* 盲盒卡片 */
    .blind-box-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #FFF9E6 0%, #FFE4B5 100%);
      padding: 40px 30px;
      border-radius: 30px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.3), 0 0 50px rgba(255, 215, 0, 0.5);
      max-width: 90%;
      width: 380px;
      text-align: center;
      z-index: 100;
      transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border: 4px solid #FFD700;
    }

    .blind-box-card.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .item-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: itemIconPop 0.6s ease-out;
      display: inline-block;
    }

    @keyframes itemIconPop {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      50% { transform: scale(1.3) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .item-name {
      font-size: 1.5rem;
      font-weight: bold;
      color: #FF8C00;
      margin-bottom: 15px;
    }

    .item-text {
      font-size: 1.3rem;
      color: #333;
      line-height: 1.8;
      margin-bottom: 25px;
      font-weight: 500;
    }

    .open-btn {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: white;
      border: none;
      padding: 15px 45px;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
    }

    .open-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
    }

    .open-btn:active {
      transform: translateY(-1px) scale(1.02);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 99;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .confetti {
      position: fixed;
      width: 12px;
      height: 12px;
      animation: confettiFall 3s linear forwards;
      pointer-events: none;
      z-index: 98;
      border-radius: 2px;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg) translateX(0);
      }
      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(720deg) translateX(100px);
      }
    }

    .footer-tip {
      color: #1E90FF;
      font-size: 1rem;
      margin-top: 25px;
      text-align: center;
      z-index: 10;
      font-weight: 500;
    }

    .sparkle {
      position: absolute;
      width: 25px;
      height: 25px;
      background: radial-gradient(circle, #FFD700, transparent);
      border-radius: 50%;
      animation: sparkleAnim 0.8s ease-out forwards;
      pointer-events: none;
      z-index: 11;
    }

    @keyframes sparkleAnim {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* 道具图标掉落特效 */
    .drop-item {
      position: absolute;
      font-size: 3rem;
      animation: dropItemAnim 1.5s ease-out forwards;
      z-index: 50;
      pointer-events: none;
    }

    @keyframes dropItemAnim {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg) scale(0.5);
      }
      100% {
        opacity: 0;
        transform: translateY(300px) rotate(360deg) scale(1.5);
      }
    }
  </style>
</head>

  <script>

    const doraemonWrapper = document.getElementById('doraemonWrapper');
    const bellyArea = document.getElementById('bellyArea');
    const overlay = document.getElementById('overlay');
    const blindBoxCard = document.getElementById('blindBoxCard');
    const itemIcon = document.getElementById('itemIcon');
    const itemName = document.getElementById('itemName');
    const itemText = document.getElementById('itemText');
    const openBtn = document.getElementById('openBtn');

    // 点击肚子
    bellyArea.addEventListener('click', (e) => {
      e.stopPropagation();
      showItem(e);
    });

    doraemonWrapper.addEventListener('click', (e) => {
      showItem(e);
    });

    function showItem(e) {
      // 随机选择道具
      const randomItem = items[Math.floor(Math.random() * items.length)];
      itemIcon.textContent = randomItem.icon;
      itemName.textContent = randomItem.name;
      itemText.textContent = randomItem.text;

      // 显示卡片
      overlay.classList.add('show');
      blindBoxCard.classList.add('show');

      // 道具掉落特效
      createDropItem(e.clientX, e.clientY, randomItem.icon);

      // 彩带特效
      createConfetti();

      // 星光特效
      if (e && e.clientX) {
        createSparkles(e.clientX, e.clientY);
      }
    }

    function hideItem() {
      overlay.classList.remove('show');
      blindBoxCard.classList.remove('show');
    }

    openBtn.addEventListener('click', hideItem);
    overlay.addEventListener('click', hideItem);

    // 道具掉落特效
    function createDropItem(x, y, icon) {
      const dropItem = document.createElement('div');
      dropItem.className = 'drop-item';
      dropItem.textContent = icon;

      // 从哆啦 A 梦肚子位置掉落
      const doraemonRect = doraemonWrapper.getBoundingClientRect();
      dropItem.style.left = (doraemonRect.left + doraemonRect.width / 2 - 24) + 'px';
      dropItem.style.top = (doraemonRect.top + doraemonRect.height / 2) + 'px';

      document.body.appendChild(dropItem);
      setTimeout(() => dropItem.remove(), 1500);
    }

    // 彩带特效
    function createConfetti() {
      const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFB6E0', '#98D8EA'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + '%';
          confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDelay = Math.random() * 0.3 + 's';
          confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 3000);
        }, i * 30);
      }
    }

    // 星光特效
    function createSparkles(x, y) {
      for (let i = 0; i < 10; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = (x + (Math.random() - 0.5) * 120) + 'px';
        sparkle.style.top = (y + (Math.random() - 0.5) * 120) + 'px';
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 800);
      }
    }

    // ESC 关闭
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideItem();
    });
  </script>
</body>
